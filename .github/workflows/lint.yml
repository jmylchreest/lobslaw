name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: setup go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a9a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@a4f60bb28d35aeee14e6880718e0c85ff1882e64 # v7.0.0
        with:
          version: latest

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need gofmt:"
            gofmt -l .
            exit 1
          fi

  buf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # buf breaking needs the full history (or at least the base branch)
          # to compare against. fetch-depth: 0 is the simplest correct choice.
          fetch-depth: 0

      - name: setup buf
        uses: bufbuild/buf-action@3f69d0a55ba1a61a3823f84f0cd7a27e0b66e56c # v1.4.0
        with:
          lint: true
          breaking: true
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main'
