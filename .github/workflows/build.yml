name: build

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: build-${{ github.ref }}-${{ matrix.os }}-${{ matrix.arch }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: setup go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a9a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: |
          VERSION="${GITHUB_REF_NAME}-$(git rev-parse --short HEAD)"
          COMMIT="$(git rev-parse HEAD)"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}"
          mkdir -p dist
          go build -trimpath -ldflags "${LDFLAGS}" -o "dist/lobslaw-${GOOS}-${GOARCH}" ./cmd/lobslaw
