version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/jmylchreest/lobslaw/pkg/proto

plugins:
  - local: protoc-gen-go
    out: pkg/proto
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: pkg/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
