# lobslaw container config.
# Paths are container-internal. Edit on the host; bind-mounted ro.

[cluster]
listen_addr = "0.0.0.0:7443"
data_dir    = "/var/lobslaw/data"
# bootstrap (default true): solo-bootstrap if no seed reachable.
# Flip to false on multi-node joiners that must not split-brain.
# bootstrap = true
# bootstrap_timeout = "30s"

[cluster.mtls]
ca_cert   = "/etc/lobslaw/certs/ca.pem"
node_cert = "/etc/lobslaw/certs/node-cert.pem"
node_key  = "/etc/lobslaw/certs/node-key.pem"

[memory]
enabled = true

[memory.encryption]
key_ref = "env:LOBSLAW_MEMORY_KEY"

[memory.snapshot]
target    = "storage:local-snapshots"
cadence   = "1h"
retention = "7d"

[storage]
enabled = true

# ----- Internal: cluster-private storage (snapshot target) ---------
# Snapshot target lives inside the data volume so raft snapshots
# land on the same persistent disk as raft.db / state.db. Off-host
# durability is a separate concern — add an [[storage.mounts]] of
# type "rclone"/"s3"/"r2" and re-point [memory.snapshot] target.
[[storage.mounts]]
label = "local-snapshots"
type  = "local"
path  = "/var/lobslaw/data/snapshots"

# ----- Read-only system surfaces -----------------------------------
# Operator-managed extension dir at /lobslaw/usr/bin (uv/uvx live
# here, populated by the uv-init sidecar). Mode "rx": the agent can
# read+exec these binaries (shell_command's Landlock sandbox honours
# this) but not modify them. Self-discovery via list/glob/read still
# works because Read is implicit in "rx".
#
# The alpine runtime image provides /bin and /usr/bin natively; we
# don't declare a separate system-bin mount because skill subprocesses
# inherit the container's PATH and busybox is on it.
# may exec but not write. Operators (or the `tools` sidecar) push
# binaries here out-of-band.
[[storage.mounts]]
label = "system-usr-bin"
type  = "local"
path  = "/lobslaw/usr/bin"
mode  = "rx"

# Self-introspection mount. The agent can read its own config +
# soul. certs/ is excluded wholesale because node-key.pem is
# sensitive and the agent has no legitimate use for cert material.
[[storage.mounts]]
label    = "lobslaw-config"
type     = "local"
path     = "/etc/lobslaw"
mode     = "r"
excludes = ["certs/**"]

# ----- Writable: user content + skills -----------------------------
# Workspace bind-mounted from ~/.config/lobslaw/workspace on the
# host. This is the agent's home for scratch files, notes, and
# anything write_file/edit_file produces.
[[storage.mounts]]
label = "workspace"
type  = "local"
path  = "/workspace"
mode  = "rw"

# The binary install workspace — operator-owned territory where
# binary_install writes. Distinct from /lobslaw/usr/bin (which
# uv-init populates with the uv/uvx bootstrap tools and we treat
# as read-only at runtime). Skill subprocesses get rx — they can
# read and execute installed binaries but never write. Only the
# lobslaw process (the installer) writes here, and the agent only
# writes via the operator-gated binary_install builtin.
#
# Persistence is the operator's choice: pair this mount with a
# named volume in compose for persistence (recommended), or omit
# the volume to let it live on the container's writable layer
# (ephemeral — every restart wipes it; binary_install reruns on
# demand).
[[storage.mounts]]
label = "binaries"
type  = "local"
path  = "/lobslaw/usr/local"
mode  = "rx"

[security]
# Egress to the clawhub.ai skill catalogue. clawhub.ai is the
# Cloudflare-fronted public API root; bundle download lives at
# <baseURL>/api/v1/download?slug=<name>. Setting this:
#  1. Wires the clawhub_install builtin (still policy-gated below)
#  2. Adds clawhub.ai to the "clawhub" smokescreen egress role
#     so bundle downloads can succeed.
#
# Verify reachable from the cluster network:
#   curl -sLI "https://clawhub.ai/api/v1/download?slug=gog" | head -1
#   # Expect: HTTP/2 200
clawhub_base_url = "https://clawhub.ai"

# Optional override of the binary download allowlist. When unset
# (and clawhub_base_url is set), defaults to github.com release
# hosts — the most common skill-binary distribution.
# clawhub_binary_hosts = ["github.com", "objects.githubusercontent.com", "*.githubusercontent.com"]

# Where binary_install puts user-mode installs. Convention:
# /lobslaw/usr/local — FHS-aligned for "operator-installed stuff",
# distinct from /lobslaw/usr/bin (which uv-init owns) and /usr/bin
# (image-baked baseline). Pair with a named volume in compose for
# persistence, or skip the volume for ephemeral installs that
# reset on container restart. System managers (apt/dnf/pacman/apk)
# ignore this — only user-mode managers (npm, cargo, go-install,
# uvx, pipx, curl-sh) honour it.
binary_install_prefix = "/lobslaw/usr/local"

[policy]
enabled = true

# --- Policy: builtins are default-allow, skills + MCP are not ---
#
# Builtins (current_time, fetch_url, web_search, debug_*, etc.) get
# a default-allow seed at boot — they're lobslaw-curated and
# shipped with the binary. Skills and MCP tools have NO default-
# allow seed: the operator opts in explicitly per scope so a
# malicious or buggy upstream can't widen the agent's reach
# silently. The credentials flow is already skill-gated separately
# (each skill must be explicitly granted access to a credential
# via credentials_grant before it can use the token).
#
# Sensitive owner-only tools (soul_*, oauth_*, credentials_*,
# clawhub_install) are deliberately left unseeded — the rule below
# is the ONLY thing that lets the agent call them, and the
# subject="scope:owner" gate keeps strangers out.

[[policy.rules]]
id       = "owner-soul-tools"
subject  = "scope:owner"      # MUST be kind:value — bare "owner" is malformed → no-match
action   = "tool:exec"
resource = "soul_*"
effect   = "allow"
priority = 20

# Owner-only management of authentication + credentials + skill installs.
[[policy.rules]]
id       = "owner-oauth-credentials"
subject  = "scope:owner"
action   = "tool:exec"
resource = "oauth_*"
effect   = "allow"
priority = 20

[[policy.rules]]
id       = "owner-credentials-acl"
subject  = "scope:owner"
action   = "tool:exec"
resource = "credentials_*"
effect   = "allow"
priority = 20

[[policy.rules]]
id       = "owner-clawhub-install"
subject  = "scope:owner"
action   = "tool:exec"
resource = "clawhub_install"
effect   = "allow"
priority = 20

# After running clawhub_install for a skill, add a per-skill
# allow rule so the agent can call its tool. Example for gog
# (uncomment after `clawhub_install slug="steipete/gog"`):
#
# [[policy.rules]]
# id       = "owner-tool-gog"
# subject  = "scope:owner"
# action   = "tool:exec"
# resource = "gog"
# effect   = "allow"
# priority = 20
#
# For destructive sub-operations, prefer require_confirmation:
# [[policy.rules]]
# id       = "owner-tool-gog-confirm-mail"
# subject  = "scope:owner"
# action   = "tool:exec"
# resource = "gog"
# effect   = "require_confirmation"
# priority = 50  # higher priority wins; allow at 20 + this at 50 = confirm

# --- Binary install ---
#
# Host binaries (gh, jq, uvx, ...) are installed automatically when
# clawhub_install lands a skill whose bundle declares them in
# clawdbot.requires.bins. The bundle's clawdbot.install array tells
# the runtime how (brew, apt, pacman, curl-sh-with-checksum, etc.).
# No operator [[binary]] config — the trust gate is the clawhub
# bundle being installed (already gated by the clawhub_install
# policy rule above) plus the per-skill tool:exec rule.
#
# Pre-installed binaries (baked into the image, bind-mounted from
# host, installed via the operator's normal package manager) "just
# work" — when the skill's bin requirement is already on PATH the
# install pipeline skips it.

# --- MCP tools: explicit allow per scope ---
#
# MCP tools come from external servers; operator opts in here.
# Resource patterns support glob: "minimax.*" matches every minimax
# tool. Tighten by listing specific names (resource = "minimax.text_to_image")
# when you want a subset. Owner-only by default — extend to other
# scopes with extra rules.

# [[policy.rules]]
# id       = "owner-allow-minimax"
# subject  = "scope:owner"
# action   = "tool:exec"
# resource = "minimax.*"
# effect   = "allow"
# priority = 10

# --- Skills: one allow rule per installed skill ---
#
# The skill registry watcher picks up manifests from the skill mount;
# each skill becomes a tool the operator opts into here. Unconfigured
# skills are policy-denied even though they appear in debug_tools.

# [[policy.rules]]
# id       = "owner-allow-gws-workspace"
# subject  = "scope:owner"
# action   = "tool:exec"
# resource = "gws-workspace"
# effect   = "allow"
# priority = 10

[compute]
enabled = true

# Providers self-declare their capabilities. The modality builtins
# (read_image, read_audio, read_pdf) auto-discover by capability tag
# — operators don't wire each builtin separately. Higher `priority`
# wins when multiple providers claim the same capability; declaration
# order breaks ties.
#
# Capability tokens lobslaw consumes:
#   chat, function-calling — main agent loop
#   vision                 — read_image
#   audio-transcription    — read_audio (Whisper-style multipart)
#   audio-multimodal       — read_audio (chat-completions input_audio)
#   pdf                    — read_pdf
#   embeddings             — vector embedding endpoint

# Primary: MiniMax-M2.7 via the MiniMax Token Plan API directly.
# api.minimax.io/v1 is the Token Plan endpoint (sk-cp-* keys) — DO
# NOT confuse with api.minimaxi.chat/v1 which is pay-as-you-go.
# Was qwen3.6-plus on OpenRouter but the operator's OpenRouter
# privacy settings (https://openrouter.ai/settings/privacy) exclude
# every endpoint that serves it, returning 404 "no endpoints
# available matching your guardrail restrictions and data policy".
# Once the operator opens those settings, swap priorities.
[[compute.providers]]
label             = "minimax-m2.7"
endpoint          = "https://api.minimax.io/v1"
model             = "MiniMax-M2.7"
api_key_ref       = "env:LOBSLAW_MINIMAX_API_KEY"
trust_tier        = "private"
capabilities      = ["chat", "function-calling"]
priority          = 10
auto_capabilities = true
backup            = "qwen3.6-plus"

# Fallback: Qwen 3.6 Plus via OpenRouter. Currently 404s on this
# operator's account; left here for when their privacy settings
# allow it (or as a fallback when MiniMax has an outage).
[[compute.providers]]
label             = "qwen3.6-plus"
endpoint          = "https://openrouter.ai/api/v1"
model             = "qwen/qwen3.6-plus"
api_key_ref       = "env:LOBSLAW_OPENROUTER_API_KEY"
trust_tier        = "private"
capabilities      = ["chat", "function-calling"]
priority          = 5
auto_capabilities = true

[[compute.providers]]
label        = "fast-vision"
endpoint     = "https://api.minimaxi.chat/v1/chat/completions"
model        = "abab6.5s-chat"
api_key_ref  = "env:LOBSLAW_MINIMAX_API_KEY"
trust_tier   = "public"
capabilities = ["vision"]
priority     = 5

[[compute.providers]]
label        = "fast-audio"
endpoint     = "https://api.minimaxi.chat/v1/audio/transcriptions"
model        = "speech-01"
api_key_ref  = "env:LOBSLAW_MINIMAX_API_KEY"
trust_tier   = "public"
capabilities = ["audio-transcription"]
priority     = 5

[compute.budgets]
max_tool_calls_per_turn   = 30
max_spend_usd_per_turn    = 0.50
max_egress_bytes_per_turn = 10000000

# Embeddings — Qwen3 8B via OpenRouter. 4096 dims, ZDR-compliant
# (DeepInfra + Nebius routes per https://openrouter.ai/api/v1/endpoints/zdr).
# Same key as the chat models.
[compute.embeddings]
endpoint    = "https://openrouter.ai/api/v1"
model       = "qwen/qwen3-embedding-8b"
api_key_ref = "env:LOBSLAW_OPENROUTER_API_KEY"
dims        = 4096

[compute.roles]
main      = "minimax-m2.7"
preflight = "minimax-m2.7"
reranker  = "minimax-m2.7"

# Exa-backed web_search builtin. Gated on api_key_ref — empty value
# means no registration (operator opt-in). Endpoint defaults to
# Exa's public API; override for self-hosted Exa proxies.
[compute.web_search]
api_key_ref = "env:LOBSLAW_EXA_API_KEY"

# Vision: read_image builtin so the agent can actually inspect
# attached images even when the main model is text-only. Uses an
# OpenAI-compatible /chat/completions multimodal call. MiniMax's
# abab6.5s-chat accepts the same wire shape as OpenAI's vision
# models. Reusing LOBSLAW_MINIMAX_API_KEY since both endpoints share
# MiniMax billing.
# Modality blocks are no longer needed when capability tags are
# declared above. Uncomment to pin a specific provider for a
# modality, bypassing the capability+priority auto-discovery:
#
#   [compute.vision]
#   provider = "fast-vision"
#
#   [compute.audio]
#   provider = "fast-audio"
#
#   [compute.pdf]
#   provider = "openrouter-multi"

[gateway]
enabled              = true
http_port            = 8443
confirmation_timeout = "5m"

[[gateway.channels]]
type = "rest"

# Telegram long-poll. Only the raft leader actually polls (gated by
# singleton.LeaderGate), so multi-node clusters don't fight for the
# bot token. Set LOBSLAW_TELEGRAM_BOT_TOKEN in .env; leave empty to
# disable cleanly (handler refuses to construct on empty token).
[[gateway.channels]]
type           = "telegram"
mode           = "poll"
bot_token_ref  = "env:LOBSLAW_TELEGRAM_BOT_TOKEN"

# Allowlist of Telegram user IDs (numeric, never usernames — those
# can change). Anyone not in this map is dropped per the strict
# unknown_user_scope default. Get your ID by DMing @userinfobot or
# from the gateway's own "telegram: unknown user" log when you message.
[gateway.channels.user_scopes]
"6972251926" = "owner"

[soul]
path  = "/etc/lobslaw/SOUL.md"
scope = "default"

# Skills auto-discover under the workspace mount via fsnotify —
# drop a manifest at $HOME/.config/lobslaw/workspace/skills/<name>/
# on the host and the registry picks it up without restart.
[skills]
storage_label  = "workspace"
signing_policy = "prefer"

[scheduler]
enabled       = true
tick_interval = "1m"
claim_lease   = "5m"

[audit.local]
enabled     = true
path        = "/var/lobslaw/audit/audit.jsonl"
max_size_mb = 100
max_files   = 10

[audit.raft]
enabled = true

[discovery]
# Broadcast is the default discovery channel — every node announces
# its hostname:port on the local network and a fresh empty-state
# node uses what it hears as join candidates. Combined with the
# pre-provisioned mTLS cert (the actual auth boundary), this lets
# a new node join the cluster without an explicit seed_nodes entry.
# Set seed_nodes too if your network blocks broadcast (cross-VPC,
# many cloud setups). Either source is enough.
broadcast         = true
broadcast_port    = 7445
broadcast_address = "255.255.255.255"
# seed_nodes = ["lobslaw-1:7443"]

# ----- MCP servers --------------------------------------------------
# Each [[mcp.servers]] entry is spawned as a stdio subprocess by
# lobslaw at boot. The agent gets the server's tools auto-merged into
# its tool registry under "<server>.<tool>" namespacing. secret_env
# values are resolved via lobslaw's secret resolver (env:VAR /
# file:/path) so keys never appear in plaintext in this file.

# MiniMax MCP — installed at runtime by lobslaw via the `uv` binary
# the uv-init container dropped into /lobslaw/usr/bin (static Rust,
# runs fine under distroless). uv brings its own self-contained
# Python interpreter (python-build-standalone) so the MCP server's
# Python deps don't need any system libs from lobslaw's runtime.
#
# All uv state — managed Pythons, the tool's venv, the download
# cache — lives under /workspace/tools (a host bind-mount via the
# existing $HOME/.config/lobslaw/workspace mount). Installs persist
# across container restarts, are host-visible, and host-deletable.
#
# `install` is the supply-chain boundary: pin a specific version or
# uv pulls whatever PyPI's `latest` resolves to.
[mcp.servers.minimax]
install    = ["uv", "tool", "install", "minimax-mcp==0.0.18"]
command    = "uvx"
args       = ["minimax-mcp"]
env        = { UV_TOOL_DIR = "/workspace/tools/uv-tools", UV_PYTHON_INSTALL_DIR = "/workspace/tools/uv-python", UV_CACHE_DIR = "/workspace/tools/uv-cache", MINIMAX_API_HOST = "https://api.minimaxi.chat", MINIMAX_MCP_BASE_PATH = "/workspace/minimax", MINIMAX_API_RESOURCE_MODE = "local" }
secret_env = { MINIMAX_API_KEY = "env:LOBSLAW_MINIMAX_API_KEY" }
# Tools exposed (see github.com/MiniMax-AI/MiniMax-MCP):
#   text_to_audio, voice_clone, voice_design, list_voices,
#   text_to_image, generate_video, query_video_generation,
#   music_generation
# Outputs land under MINIMAX_MCP_BASE_PATH (/workspace/minimax)
# which is bind-mounted from the host workspace, so generated files
# are immediately addressable by other tools + visible on the host.

[observability]
tracing_exporter = "stdout"

[config]
watch       = true
debounce_ms = 1500
