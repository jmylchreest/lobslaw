syntax = "proto3";

package lobslaw.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// -----------------------------------------------------------------------------
// Common types
// -----------------------------------------------------------------------------

message NodeInfo {
  string id = 1;
  repeated string functions = 2;   // "memory" | "policy" | "compute" | "gateway" | "storage"
  string address = 3;              // host:port of the cluster gRPC listener
  repeated string capabilities = 4;
  bool raft_member = 5;
}

message HealthStatus {
  string node_id = 1;
  string status = 2;               // "healthy" | "degraded" | "unhealthy"
  google.protobuf.Timestamp last_seen = 3;
  repeated ComponentHealth components = 4;
}

message ComponentHealth {
  string name = 1;
  string status = 2;
  string error = 3;
}

// -----------------------------------------------------------------------------
// NodeService — cluster membership, heartbeat, reload
// -----------------------------------------------------------------------------

service NodeService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetPeers(GetPeersRequest) returns (GetPeersResponse);
  rpc Reload(ReloadRequest) returns (ReloadResponse);
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
}

message RegisterRequest { NodeInfo node = 1; }
message RegisterResponse {
  bool accepted = 1;
  string reason = 2;
}

message DeregisterRequest { string node_id = 1; }
message DeregisterResponse {}

message HeartbeatRequest {
  string node_id = 1;
  HealthStatus health = 2;
}
message HeartbeatResponse {}

message GetPeersRequest {}
message GetPeersResponse { repeated NodeInfo peers = 1; }

message ReloadRequest {
  // Empty list = reload everything reloadable.
  repeated string sections = 1;
}
message ReloadResponse {
  repeated string reloaded = 1;
  repeated string restart_needed = 2;
  map<string, string> errors = 3;
}

message AddMemberRequest {
  string node_id = 1;
  string address = 2;   // host:port peers dial to reach the joining node
  bool voter = 3;       // true = voting member; non-voting learners are future work
}
message AddMemberResponse {
  bool accepted = 1;
  // LeaderAddress is set when the handler wasn't the leader. Callers
  // retry against that address. Empty when there's no leader yet.
  string leader_address = 2;
}

// -----------------------------------------------------------------------------
// MemoryService — vector + episodic memory + retention + forget
// -----------------------------------------------------------------------------

service MemoryService {
  rpc Store(StoreRequest) returns (StoreResponse);
  rpc Recall(RecallRequest) returns (RecallResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc EpisodicAdd(EpisodicAddRequest) returns (EpisodicAddResponse);
  rpc Dream(DreamRequest) returns (DreamResponse);
  rpc Forget(ForgetRequest) returns (ForgetResponse);
  // FindClusters — deterministic near-duplicate detection for the
  // Dream-time consolidation merge flow. Pure math (pairwise cosine
  // + union-find); no LLM. See docs/MEMORY.md for the composition
  // pattern with the Adjudicator LLM interface.
  rpc FindClusters(FindClustersRequest) returns (FindClustersResponse);
}

// Retention governs how long a memory record lives before it's a
// candidate for consolidation or pruning. Defined as a proto enum
// (rather than a free-form string) so writers can't accidentally
// emit "long" instead of "long-term" — the compiler binds the
// constant to the field. UNSPECIFIED defaults to EPISODIC at the
// service layer for legacy callers.
enum Retention {
  RETENTION_UNSPECIFIED = 0;
  RETENTION_SESSION = 1;
  RETENTION_EPISODIC = 2;
  RETENTION_LONG_TERM = 3;
}

message VectorRecord {
  string id = 1;
  repeated float embedding = 2;
  string text = 3;
  map<string, string> metadata = 4;
  string scope = 5;
  Retention retention = 6;
  repeated string source_ids = 7;  // consolidation provenance
  google.protobuf.Timestamp created_at = 8;
}

message EpisodicRecord {
  string id = 1;
  string event = 2;
  string context = 3;
  int32 importance = 4;            // 1..10
  google.protobuf.Timestamp timestamp = 5;
  repeated string tags = 6;
  Retention retention = 7;
  repeated string source_ids = 8;
}

message StoreRequest { VectorRecord record = 1; }
message StoreResponse { string id = 1; }

message RecallRequest { string id = 1; }
message RecallResponse { VectorRecord record = 1; }

message SearchRequest {
  // Either embedding or text — server may call the embedding provider if text given.
  repeated float embedding = 1;
  string text = 2;
  int32 limit = 3;
  string scope_filter = 4;
  // RETENTION_UNSPECIFIED = no filter (matches all). Otherwise only
  // records with the matching retention are returned.
  Retention retention_filter = 5;
}
message SearchResponse { repeated VectorRecord hits = 1; }

message EpisodicAddRequest { EpisodicRecord record = 1; }
message EpisodicAddResponse { string id = 1; }

message DreamRequest {}
message DreamResponse {
  int32 consolidated = 1;
  int32 pruned = 2;
}

message ForgetRequest {
  string query = 1;
  google.protobuf.Timestamp before = 2;
  repeated string tags = 3;
  // Explicit record IDs to forget. When non-empty, bypasses the
  // query/before/tags scan and deletes these IDs directly (with the
  // existing cascade-via-SourceIDs semantics). Lets clients compose
  // Search→preview→Forget pipelines without a dedicated "forget by
  // similarity" RPC. At least one of query/before/tags/ids must be
  // set — the handler still refuses to forget everything.
  repeated string ids = 4;
}
message ForgetResponse {
  int32 records_removed = 1;
  int32 consolidations_reforged = 2;
}

// FindClusters groups near-duplicate VectorRecords for the Dream-
// time merge flow. O(n²) pairwise cosine over the vector bucket,
// union-find connected components. Intentionally no LLM — the
// Adjudicator (LLM layer) takes the clusters and decides what to
// do with each. Scope and retention filters keep ephemeral session
// records out of the long-term merge path.
message FindClustersRequest {
  float threshold = 1;            // minimum pairwise cosine, e.g. 0.88
  int32 min_cluster_size = 2;     // default 2 (skip singletons)
  int32 max_cluster_size = 3;     // default 10 (split giant CCs)
  string scope_filter = 4;        // only records in this scope
  Retention retention_filter = 5;
  google.protobuf.Timestamp before = 6;
  int32 limit = 7;                // cap returned cluster count
}
message FindClustersResponse {
  repeated Cluster clusters = 1;
}
message Cluster {
  string id = 1;                            // stable hash of sorted member IDs
  repeated VectorRecord records = 2;
  float min_similarity = 3;                 // worst pairwise within cluster
  float avg_similarity = 4;
}

// -----------------------------------------------------------------------------
// PolicyService — RBAC, risk tiers, confirmation
// -----------------------------------------------------------------------------

service PolicyService {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
  rpc SyncRules(SyncRulesRequest) returns (SyncRulesResponse);
  rpc AddRule(AddRuleRequest) returns (AddRuleResponse);
  rpc RequestConfirmation(RequestConfirmationRequest) returns (RequestConfirmationResponse);
}

message PolicyRule {
  string id = 1;
  string subject = 2;              // user:alice, role:admin, node:memory-1
  string action = 3;               // memory:read, tool:exec, storage:write
  string resource = 4;             // /path, memory:*, service:*
  string effect = 5;               // "allow" | "deny" | "require_confirmation"
  repeated Condition conditions = 6;
  int32 priority = 7;
  string scope = 8;
}

message Condition {
  string key = 1;                  // "time_of_day" | "peer_cidr" | ...
  string op = 2;                   // "in" | "between" | "eq"
  string value = 3;
}

message Claims {
  string user_id = 1;
  repeated string roles = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Timestamp issued_at = 4;
  string issuer = 5;
  string audience = 6;
  string scope = 7;
}

message EvaluateRequest {
  Claims claims = 1;
  string action = 2;
  string resource = 3;
}
message EvaluateResponse {
  string effect = 1;               // "allow" | "deny" | "require_confirmation"
  string rule_id = 2;              // id of the matching rule (or "" for default-deny)
  string reason = 3;
}

message SyncRulesRequest {}
message SyncRulesResponse { repeated PolicyRule rules = 1; }

message AddRuleRequest { PolicyRule rule = 1; }
message AddRuleResponse { string id = 1; }

message RequestConfirmationRequest {
  string user = 1;
  string question = 2;
  repeated string options = 3;
  google.protobuf.Duration timeout = 4;
  string originating_channel = 5;  // which channel to deliver the prompt on
}
message RequestConfirmationResponse {
  bool approved = 1;
  string chosen_option = 2;
  bool timed_out = 3;
}

// -----------------------------------------------------------------------------
// AgentService — tool invocation, tool listing, message processing
// -----------------------------------------------------------------------------

service AgentService {
  rpc InvokeTool(InvokeToolRequest) returns (InvokeToolResponse);
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc ProcessMessage(ProcessMessageRequest) returns (ProcessMessageResponse);
}

message ToolDef {
  string name = 1;
  string path = 2;
  repeated string argv_template = 3;
  repeated string capabilities = 4;
  bool sidecar_only = 5;
  string risk_tier = 6;            // "reversible" | "communicating" | "irreversible"
}

message InvokeToolRequest {
  string tool = 1;
  map<string, string> params = 2;
  Claims claims = 3;
  string turn_id = 4;
}
message InvokeToolResponse {
  int32 exit_code = 1;
  bytes stdout = 2;
  bytes stderr = 3;
  string effect_applied = 4;       // policy effect that gated the call
}

message ListToolsRequest {}
message ListToolsResponse { repeated ToolDef tools = 1; }

message ProcessMessageRequest {
  Claims claims = 1;
  string text = 2;
  map<string, string> metadata = 3;
  string channel = 4;
  string turn_id = 5;
}
message ProcessMessageResponse {
  string text = 1;
  map<string, string> metadata = 2;
  int32 tool_calls = 3;
  double spend_usd = 4;
}

// -----------------------------------------------------------------------------
// ChannelService — inbound update handling + inline confirmation prompts
// -----------------------------------------------------------------------------

service ChannelService {
  rpc HandleUpdate(HandleUpdateRequest) returns (HandleUpdateResponse);
  rpc Prompt(PromptRequest) returns (PromptResponse);
}

message HandleUpdateRequest {
  string channel = 1;              // "telegram" | "rest" | "websocket"
  bytes payload = 2;               // channel-specific encoded update
  map<string, string> headers = 3;
}
message HandleUpdateResponse { bool accepted = 1; }

message PromptRequest {
  string channel = 1;
  string user = 2;
  string question = 3;
  repeated string options = 4;
  google.protobuf.Duration timeout = 5;
}
message PromptResponse {
  string chosen_option = 1;
  bool timed_out = 2;
}

// -----------------------------------------------------------------------------
// PlanService — the "what's your plan today?" surface
// -----------------------------------------------------------------------------

service PlanService {
  rpc GetPlan(GetPlanRequest) returns (GetPlanResponse);
  rpc AddCommitment(AddCommitmentRequest) returns (AddCommitmentResponse);
  rpc CancelCommitment(CancelCommitmentRequest) returns (CancelCommitmentResponse);
}

message AgentCommitment {
  string id = 1;
  google.protobuf.Timestamp due_at = 2;
  string trigger = 3;              // "time" | "event:xxx"
  string reason = 4;
  string created_from_turn = 5;
  string created_for = 6;
  string status = 7;               // "pending" | "done" | "cancelled"
  string handler_ref = 8;
  map<string, string> params = 9;
  // Raft-CAS claim for cluster-wide singleton execution. See
  // lobslaw-cluster-claim decision for semantics: whoever CASes the
  // claim first wins and the rest skip. Expired claims are treated
  // as unclaimed.
  string claimed_by = 10;
  google.protobuf.Timestamp claim_expires_at = 11;
}

message ScheduledTaskRecord {
  string id = 1;
  string name = 2;
  string schedule = 3;             // cron expression
  string handler_ref = 4;
  map<string, string> params = 5;
  bool enabled = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp last_run = 9;
  google.protobuf.Timestamp next_run = 10;
  // Raft-CAS claim, same semantics as AgentCommitment.claimed_by.
  string claimed_by = 11;
  google.protobuf.Timestamp claim_expires_at = 12;
}

message InFlightWork {
  string id = 1;
  string goal = 2;
  google.protobuf.Timestamp last_progress = 3;
  string status = 4;
  repeated string blockers = 5;
}

message CheckBack {
  string id = 1;
  string original_request = 2;
  google.protobuf.Timestamp scheduled_for = 3;
}

message GetPlanRequest {
  google.protobuf.Duration window = 1;
  string scope = 2;
}
message GetPlanResponse {
  google.protobuf.Duration window = 1;
  repeated AgentCommitment commitments = 2;
  repeated ScheduledTaskRecord scheduled_tasks = 3;
  repeated InFlightWork in_flight = 4;
  repeated CheckBack check_back_threads = 5;
}

message AddCommitmentRequest { AgentCommitment commitment = 1; }
message AddCommitmentResponse { string id = 1; }

message CancelCommitmentRequest { string id = 1; }
message CancelCommitmentResponse {}

// -----------------------------------------------------------------------------
// AuditService — hash-chained tamper-evident log
// -----------------------------------------------------------------------------

service AuditService {
  rpc Append(AppendRequest) returns (AppendResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);
}

message AuditEntry {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string actor_scope = 3;
  string action = 4;
  string target = 5;
  repeated string argv = 6;
  string policy_rule = 7;
  string effect = 8;
  string result_hash = 9;
  string prev_hash = 10;
}

message AppendRequest { AuditEntry entry = 1; }
message AppendResponse { string id = 1; }

message QueryRequest {
  string actor_scope = 1;
  string action = 2;
  string target = 3;
  google.protobuf.Timestamp since = 4;
  google.protobuf.Timestamp until = 5;
  int32 limit = 6;
  string sink = 7;                 // "" | "raft" | "local"
}
message QueryResponse { repeated AuditEntry entries = 1; }

message VerifyChainRequest {
  string sink = 1;                 // "" | "raft" | "local"
}
message VerifyChainResponse {
  bool ok = 1;
  string first_break_id = 2;       // empty on success
  int64 entries_checked = 3;
}

// -----------------------------------------------------------------------------
// StorageService — cluster-wide mount config
// -----------------------------------------------------------------------------

service StorageService {
  rpc AddMount(AddMountRequest) returns (AddMountResponse);
  rpc RemoveMount(RemoveMountRequest) returns (RemoveMountResponse);
  rpc ListMounts(ListMountsRequest) returns (ListMountsResponse);
}

message StorageMount {
  string label = 1;
  string type = 2;                 // "local" | "nfs" | "rclone"
  string path = 3;                 // local: absolute path; nfs/rclone: backend-specific
  string server = 4;               // nfs: server hostname
  string export = 5;               // nfs: export path
  string remote = 6;               // rclone: remote name
  string bucket = 7;               // rclone: bucket (for object stores)
  bool crypt = 8;                  // rclone: enable crypt
  map<string, string> options = 9; // backend-specific (access_key_ref etc)
  google.protobuf.Duration poll_interval = 10;
}

message AddMountRequest { StorageMount mount = 1; }
message AddMountResponse {}

message RemoveMountRequest { string label = 1; }
message RemoveMountResponse {}

message ListMountsRequest {}
message ListMountsResponse { repeated StorageMount mounts = 1; }

// ChannelStateRecord is a generic per-channel raft-replicated key-value
// pair. Used by gateway channels to persist resume state across
// restarts (Telegram update offset, REST cursors, webhook last-seen
// timestamps). The bbolt key is "<channel>:<key>"; that lets a single
// bucket hold every channel's state without a per-channel bucket
// proliferation. Value is opaque bytes — the channel handler chooses
// the encoding (typically just decimal int64 for offsets, JSON for
// richer state).
message ChannelStateRecord {
  string channel = 1;     // "telegram" | "rest" | "webhook" | future channels
  string key = 2;         // channel-defined key, e.g. "offset", "last_seen"
  bytes value = 3;        // opaque bytes
  google.protobuf.Timestamp updated_at = 4;
}

// SoulTuneRecord holds the agent's mutable personality overlay.
// SOUL.md on disk is the operator-curated baseline (read-only); this
// record carries the bounded subset the agent may tune at runtime —
// name, the five emotive dimensions, emoji_usage, fragments. Stored
// in raft so cluster nodes agree on the agent's identity and so
// containerised deployments don't need a writable file mount.
//
// One record per cluster, keyed by the constant id "soul:tune". A
// per-field optional discriminator means an unset field falls back
// to the baseline at merge time — so when the operator edits SOUL.md
// to lower sarcasm, untuned dimensions follow the new baseline while
// fields the agent has explicitly tuned stay pinned.
message SoulTuneRecord {
  // Latest applied tune.
  SoulTuneState current = 1;
  // Past tunes for HistoryRollback. Oldest first; capped at 20.
  repeated SoulTuneState history = 2;
}

message SoulTuneState {
  optional string name = 1;
  EmotiveStyleTune emotive_style = 2;
  // fragments_set discriminates "no fragment edits" from "explicitly
  // empty fragment list" — the latter is the user clearing memory.
  bool fragments_set = 3;
  repeated string fragments = 4;
  google.protobuf.Timestamp updated_at = 5;
  // updated_by carries the subject that proposed the change ("scope:owner",
  // "user:alice"). Audit trail; not used for policy decisions.
  string updated_by = 6;
}

message EmotiveStyleTune {
  optional int32 excitement = 1;
  optional int32 formality = 2;
  optional int32 directness = 3;
  optional int32 sarcasm = 4;
  optional int32 humor = 5;
  optional string emoji_usage = 6;
}

// -----------------------------------------------------------------------------
// Raft log entry envelope
// -----------------------------------------------------------------------------
//
// Every write that goes through Raft is wrapped in a LogEntry. The FSM's
// Apply unmarshals the []byte log payload as LogEntry and dispatches on
// op kind. Delete operations carry only the target id; all other ops
// carry a typed payload.

enum LogOp {
  LOG_OP_UNSPECIFIED = 0;
  LOG_OP_PUT = 1;
  LOG_OP_DELETE = 2;
  // Conditional write: FSM reads the current record and checks that
  // its claimed_by equals expected_claimer before applying payload.
  // On mismatch the Apply returns an error so the caller's
  // raft.Apply() call surfaces ErrClaimConflict. Empty expected
  // means "expect unclaimed"; applied expiry past now is also
  // treated as unclaimed.
  LOG_OP_CLAIM = 3;
}

message LogEntry {
  LogOp op = 1;
  // Target record id for DELETE; same id also duplicates the record's
  // id field for PUT (eases indexing without fully decoding the payload).
  string id = 2;
  oneof payload {
    PolicyRule policy_rule = 10;
    ScheduledTaskRecord scheduled_task = 11;
    AgentCommitment commitment = 12;
    AuditEntry audit_entry = 13;
    VectorRecord vector_record = 14;
    EpisodicRecord episodic_record = 15;
    StorageMount storage_mount = 16;
    ChannelStateRecord channel_state = 17;
    SoulTuneRecord soul_tune = 18;
  }
  // LOG_OP_CLAIM only: the value we expect on the current record's
  // claimed_by field before we write. Used to enforce CAS semantics.
  // Ignored for PUT / DELETE.
  string expected_claimer = 20;
}
