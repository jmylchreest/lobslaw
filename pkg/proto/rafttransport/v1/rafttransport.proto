syntax = "proto3";

package rafttransport.v1;

import "google/protobuf/timestamp.proto";

// RaftTransportService implements the hashicorp/raft Transport interface
// over gRPC, riding the cluster's mTLS connection pool. Message types
// mirror hashicorp/raft's internal structs.

service RaftTransportService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc InstallSnapshot(stream InstallSnapshotRequest) returns (InstallSnapshotResponse);
  rpc TimeoutNow(TimeoutNowRequest) returns (TimeoutNowResponse);
  rpc AppendEntriesPipeline(stream AppendEntriesRequest) returns (stream AppendEntriesResponse);
}

message RPCHeader {
  int32 protocol_version = 1;
  bytes id = 2;
  bytes addr = 3;
}

message Log {
  uint64 index = 1;
  uint64 term = 2;
  uint32 type = 3;
  bytes data = 4;
  bytes extensions = 5;
  google.protobuf.Timestamp appended_at = 6;
}

message AppendEntriesRequest {
  RPCHeader header = 1;
  uint64 term = 2;
  bytes leader = 3;
  uint64 prev_log_entry = 4;
  uint64 prev_log_term = 5;
  repeated Log entries = 6;
  uint64 leader_commit_index = 7;
}

message AppendEntriesResponse {
  RPCHeader header = 1;
  uint64 term = 2;
  uint64 last_log = 3;
  bool success = 4;
  bool no_retry_backoff = 5;
}

message RequestVoteRequest {
  RPCHeader header = 1;
  uint64 term = 2;
  bytes candidate = 3;
  uint64 last_log_index = 4;
  uint64 last_log_term = 5;
  bool leadership_transfer = 6;
}

message RequestVoteResponse {
  RPCHeader header = 1;
  uint64 term = 2;
  bytes peers = 3;
  bool granted = 4;
}

message InstallSnapshotHeader {
  RPCHeader header = 1;
  int32 snapshot_version = 2;
  uint64 term = 3;
  bytes leader = 4;
  uint64 last_log_index = 5;
  uint64 last_log_term = 6;
  bytes peers = 7;
  bytes configuration = 8;
  uint64 configuration_index = 9;
  int64 size = 10;
}

// InstallSnapshotRequest is streamed: the first message in the stream
// carries the header, subsequent messages carry snapshot bytes.
message InstallSnapshotRequest {
  oneof content {
    InstallSnapshotHeader header = 1;
    bytes data = 2;
  }
}

message InstallSnapshotResponse {
  RPCHeader header = 1;
  uint64 term = 2;
  bool success = 3;
}

message TimeoutNowRequest { RPCHeader header = 1; }
message TimeoutNowResponse {
  RPCHeader header = 1;
  bool success = 2;
}
