version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - goconst
    - gocyclo
    - gocritic
    - revive
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
        - name: package-comments
        - name: indent-error-flow
        - name: errorf
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: unused-parameter
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jmylchreest/lobslaw

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
